# YAML file for

# State of this session
#   initial
#   completely filled from traces data
State: initial

# Info
Misc:
   Free format info
   wat je wil

# Assume base dir is set in application
# Powerline data directory
DataDir: data

# Traces directory
TracesDir: csv_data

# Meta data directory
MetaDir: session_data

# Timestamp of last update of this file
Timestamp: 2001-12-14 21:59:43.10 -5

# Powerline data set (also for index file)
Powerline: row004107-000001D.peach-data

# Powerline trace export
Traces: row004107-000001D_traces

# Generated list of (colum names, min, max) 
TracesInfo:
  - Time
  - GateAngle
  - GateAngle
  - GateForceX

# Boat type (generated)
Boattype : 1x
Backwing: no

# Crew info

# Generated list with for each stroke the time and rating,  derived from GateAngle?
#    tijd tussen twee opgaande nuldoorgangen, eerste als de tijd
# stilliggen (<10) als NaN?
Tempi :
  - [time, rating]
  - [1000, 10]
  - [1300, 10]
  - [1680, 13]
  

# Marked pieces: name, start, length, average rating (generated)
Pieces:
  - [name, start, length, average]
  - [Start, 12234, 2000, 30]
  - [T20, 15234, 2000, 21]
  - [T24, 19234, 2000, 24]
